name: Navigation Smoke Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  nav-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_WORDPRESS_URL: ${{ secrets.NEXT_PUBLIC_WORDPRESS_URL }}
      FAUST_SECRET_KEY: ${{ secrets.FAUST_SECRET_KEY }}
      BASE_URL: http://127.0.0.1:3002

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Start app
        run: npm run start -- --port 3002 > app.log 2>&1 &

      - name: Wait for app
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3002 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time"
          exit 1

      - name: Run navigation smoke tests
        run: npm run test:nav-smoke

      - name: Upload app log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nav-smoke-app-log
          path: app.log
